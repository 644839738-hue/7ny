services:
  postgres:
    image: postgres:16-alpine
    container_name: spriteforge-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: spriteforge
      POSTGRES_USER: spriteforge
      POSTGRES_PASSWORD: spriteforge_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
